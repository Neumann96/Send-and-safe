name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/send-and-safe

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Test backend
        run: go test ./...

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

  publish:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.ref }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image reference
        id: image
        run: |
          echo "ref=${IMAGE,,}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE,,}:latest" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}
            ${{ steps.image.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Pull and restart container
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_REF: ${{ needs.publish.outputs.image }}
        run: |
          set -euo pipefail
          scp deploy/compose.production.yaml \
            "$DEPLOY_USER@$DEPLOY_HOST:/home/$DEPLOY_USER/compose.production.yaml"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo /usr/local/sbin/prepare-send-and-safe-container"
          printf '%s' "$GHCR_TOKEN" | ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "docker login ghcr.io -u '$GHCR_USER' --password-stdin"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /opt/send-and-safe && printf 'IMAGE=%s\n' '$IMAGE_REF' > .env && docker compose pull && docker compose up -d --remove-orphans && docker logout ghcr.io"

      - name: Verify public health
        run: curl --fail --show-error --silent --retry 8 --retry-delay 3 https://sendandsafe.147-45-224-216.sslip.io/api/health
