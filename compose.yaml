services:
  app:
    build: .
    restart: unless-stopped
    environment:
      ADDR: ":8080"
      DATA_DIR: "/app/data"
      WEB_DIR: "/app/web/dist"
      MAX_FILE_BYTES: "536870912"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - send-and-safe-data:/app/data

volumes:
  send-and-safe-data:
